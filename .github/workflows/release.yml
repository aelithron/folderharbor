name: Release

on:
  push:
    tags:
      - "server/v*"
      - "cli/v*"
     # - "web/v*"

jobs:
  server-release:
    name: Release Server
    if: startsWith(github.ref, 'refs/tags/server/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: "./server"
    steps:
      - uses: actions/checkout@v6
      - name: Get Version
        run: echo "VERSION=${GITHUB_REF_NAME#server/}" >> $GITHUB_ENV
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"
          cache-dependency-path: "server/pnpm-lock.yaml"
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Compile
        run: pnpm build
      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ env.VERSION }}
        with:
          name: "Server ${{ env.VERSION }}"
  cli-release:
    name: Release CLI
    if: startsWith(github.ref, 'refs/tags/cli/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: "./cli"
    steps:
      - uses: actions/checkout@v6
      - name: Get Version
        run: echo "VERSION=${GITHUB_REF_NAME#cli/}" >> $GITHUB_ENV
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          go-version-file: "cli/go.mod"
          cache: true
          cache-dependency-path: "cli/go.sum"
      - run: go mod download
      - name: Vet
        run: go vet ./...
      - name: Build
        run: |
          mkdir dist
          GOOS=linux GOARCH=amd64 go build -o dist/folderharbor-cli-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -o dist/folderharbor-cli-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -o dist/folderharbor-cli-macos-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/folderharbor-cli-macos-arm64 .
          GOOS=windows GOARCH=amd64 go build -o dist/folderharbor-cli-windows-amd64.exe .
      - name: Checksums
        run: sha256sum dist/* > dist/checksums.txt
      - name: Release
        uses: softprops/action-gh-release@v2
        env:
          VERSION: ${{ env.VERSION }}
        with:
          name: "CLI ${{ env.VERSION }}"
          files: "cli/dist/**"
