name: Test/Lint

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  server-test:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
  cli-test:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.20"
      - name: Vet
        run: go vet -v ./...
  web-test:
    name: Test Web Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
