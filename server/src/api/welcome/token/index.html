<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FolderHarbor Server</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("signIn");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const res = await fetch("/auth", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: document.getElementById("username").value, password: document.getElementById("password").value }) });
          const body = await res.json();
          if ("error" in body) {
            document.getElementById("response").className = "flex flex-col items-center mt-4 p-3 rounded-lg bg-red-200";
            document.getElementById("resTitle").innerText = `Error signing in! (${body.error})`;
            document.getElementById("errorMsg").innerText = `${body.message}`;
            document.getElementById("token").className = "hidden";
            document.getElementById("copyWebDAV").className = "hidden";
            return;
          }
          document.getElementById("response").className = "flex flex-col items-center mt-4 p-3 rounded-lg bg-violet-200";
          document.getElementById("resTitle").innerText = "Signed in!";
          document.getElementById("token").innerText = `Your token: ${body.token}`;
          document.getElementById("token").addEventListener("click", () => {
            navigator.clipboard.writeText(body.token);
            alert("Copied!"); 
          });
          document.getElementById("copyWebDAV").addEventListener("click", () => {
            navigator.clipboard.writeText(`token_${body.token}`);
            alert("Copied! Paste this into the Password field of your WebDAV client."); 
          });
        });
      });
    </script>
    <link rel="stylesheet" href="../index.css">
  </head>
  <body class="flex flex-col min-h-screen p-8 md:p-16">
    <div class="flex flex-col justify-center items-center text-center">
      <img src="../logo.webp" alt="FolderHarbor Logo" height="300" width="300">
      <h1 class="text-xl font-semibold">Sign in to FolderHarbor</h1>
      <p class="mt-2">This page is used to sign in and get a token for this FolderHarbor server.</p>
      <p class="flex gap-1">You can use this token in WebDAV by entering `token_[your token]` as your password.</p>
      <form onsubmit="(e) => signIn(e)" class="flex flex-col gap-1 mt-2" id="signIn">
        <label for="username">Username</label>
        <input type="text" id="username" class="border-black border-2 rounded-lg p-1">
        <label for="password" class="mt-1">Password</label>
        <input type="password" id="password" class="border-black border-2 rounded-lg p-1">
        <button type="submit" class="bg-violet-500 p-1 rounded-lg text-white mt-2 hover:text-sky-500">Sign In</button>
      </form>
      <div class="hidden" id="response">
        <h1 id="resTitle" class="text-lg font-semibold"></h1>
        <pre id="token" class="bg-slate-200 p-4 rounded-lg hover:text-sky-500"></pre>
        <button id="copyWebDAV" type="button" class="bg-violet-500 p-1 px-2 rounded-lg text-white mt-2 hover:text-sky-500">Copy for WebDAV</button>
        <p id="errorMsg"></p>
      </div>
    </div>
  </body>
</html>
